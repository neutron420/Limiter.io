name: limiter-prod
services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?set in .env.prod}
      POSTGRES_DB: ${DB_NAME:-ratelimiter}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-ratelimiter}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  kafka:
    image: apache/kafka:3.7.0
    restart: unless-stopped
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_LISTENERS=INTERNAL://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=INTERNAL://kafka:9092
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_INTER_BROKER_LISTENER_NAME=INTERNAL
      - KAFKA_LOG_DIRS=/tmp/kraft-combined-logs
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
    volumes:
      - kafka_data:/tmp/kraft-combined-logs
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 10s
      retries: 12

  api:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    restart: unless-stopped
    command: ["./api"]
    env_file:
      - ./.env.prod
    environment:
      # In-cluster endpoints override whatever the env file says.
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_SSLMODE: disable
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_URL: ""
      KAFKA_BROKERS: kafka:9092
      ENV: production
      PORT: "8080"
    ports:
      - "127.0.0.1:8080:8080" # only nginx talks to it
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 10

  consumer:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    restart: unless-stopped
    command: ["./consumer"]
    env_file:
      - ./.env.prod
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_SSLMODE: disable
      KAFKA_BROKERS: kafka:9092
      ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  landing:
    build:
      context: ../../landing
      dockerfile: Dockerfile
      args:
        # NEXT_PUBLIC_* are compile-time — injected by the deploy workflow.
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?set in .env.prod}
        NEXT_PUBLIC_LEMONSQUEEZY_CHECKOUT_URL: ${NEXT_PUBLIC_LEMONSQUEEZY_CHECKOUT_URL:-}
        NEXT_PUBLIC_SALES_EMAIL: ${NEXT_PUBLIC_SALES_EMAIL:-sales@limiter.io}
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000" # only nginx talks to it
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  kafka_data:
