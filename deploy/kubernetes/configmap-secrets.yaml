apiVersion: v1
kind: ConfigMap
metadata:
  name: rate-limiter-config
  namespace: default
data:
  ENV: "production"
  PORT: "8080"
  DB_HOST: "postgres"
  DB_PORT: "5432"
  DB_NAME: "ratelimiter"
  DB_SSLMODE: "disable"
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  REDIS_DB: "0"
  KAFKA_BROKERS: "kafka-service:9092"
  KAFKA_TOPIC: "api_logs"
  KAFKA_GROUP_ID: "analytics_consumers"
  JWT_ACCESS_TTL: "15m"
  JWT_REFRESH_TTL: "168h"
  ADMIN_EMAIL: "admin@ratelimiter.io"

---
apiVersion: v1
kind: Secret
metadata:
  name: rate-limiter-secrets
  namespace: default
type: Opaque
data:
  # Base64 encoded values for sensitive data
  # postgres (root-level password)
  DB_USER: cG9zdGdyZXM=
  DB_PASSWORD: cG9zdGdyZXM=
  # super_secret_jwt_key_please_change_in_production
  JWT_SECRET: c3VwZXJfc2VjcmV0X2p3dF9rZXlfcGxlYXNlX2NoYW5nZV9pbl9wcm9kdWN0aW9u
  # AdminPass123!
  ADMIN_PASSWORD: QWRtaW5QYXNzMTIzIQ==
