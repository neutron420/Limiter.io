name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-test:
    name: Backend Test & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Install Dependencies
        run: go mod download

      - name: Run Tests
        run: go test -v ./...

      - name: Build API
        run: go build -o api cmd/api/main.go

      - name: Build Consumer
        run: go build -o consumer cmd/consumer/main.go

  frontend-test:
    name: Frontend Typecheck & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: landing
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Run TypeScript Check
        run: pnpm run tsc --noEmit || npx tsc --noEmit

      - name: Build Frontend
        run: pnpm run build

  docker-build:
    name: Verify Docker Compose Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Compose Services
        run: docker compose -f deploy/docker/docker-compose.yml build
