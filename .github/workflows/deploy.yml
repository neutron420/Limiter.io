name: Deploy to EC2
on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & Deploy on EC2
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync repository to EC2
        run: |
          rsync -az --delete \
            --exclude '.git' \
            --exclude 'landing/node_modules' \
            --exclude 'landing/.next' \
            --exclude 'deploy/docker/.env' \
            --exclude 'deploy/docker/.env.prod' \
            -e "ssh -i ~/.ssh/deploy_key" \
            ./ ubuntu@${{ secrets.EC2_HOST }}:/opt/limiter/app/

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Build Go binaries
        run: |
          CGO_ENABLED=0 GOOS=linux go build -ldflags="-w -s" -o api-linux ./cmd/api/main.go
          CGO_ENABLED=0 GOOS=linux go build -ldflags="-w -s" -o consumer-linux ./cmd/consumer/main.go
          ls -lh api-linux consumer-linux

      - name: Write production env file
        run: |
          ssh -i ~/.ssh/deploy_key ubuntu@${{ secrets.EC2_HOST }} "cat > /opt/limiter/.env.prod" <<'EOF'
          ${{ secrets.PROD_ENV_FILE }}
          EOF

      - name: Copy Go binaries to EC2
        run: |
          scp -i ~/.ssh/deploy_key api-linux ubuntu@${{ secrets.EC2_HOST }}:/opt/limiter/app/api
          scp -i ~/.ssh/deploy_key consumer-linux ubuntu@${{ secrets.EC2_HOST }}:/opt/limiter/app/consumer
          ssh -i ~/.ssh/deploy_key ubuntu@${{ secrets.EC2_HOST }} "chmod +x /opt/limiter/app/api /opt/limiter/app/consumer"

      - name: Build and restart stack
        run: |
          ssh -i ~/.ssh/deploy_key ubuntu@${{ secrets.EC2_HOST }} bash -s <<'EOF'
          set -euo pipefail
          cd /opt/limiter/app/deploy/docker

          # .env.prod feeds compose interpolation (as .env) and the api/consumer env_file
          cp /opt/limiter/.env.prod .env.prod
          cp /opt/limiter/.env.prod .env

          # Force full rebuild of landing (Docker cache often misses file changes)
          docker compose -f docker-compose.prod.yml build --no-cache --pull landing
          docker compose -f docker-compose.prod.yml build --pull
          docker compose -f docker-compose.prod.yml up -d --remove-orphans

          # prune old build layers so the disk doesn't fill up over time
          docker image prune -f
          EOF

      - name: Health check
        run: |
          echo "Waiting for services to become healthy..."
          ssh -i ~/.ssh/deploy_key ubuntu@${{ secrets.EC2_HOST }} bash -s <<'HEOF'
          set -euo pipefail
          for i in $(seq 1 60); do
            code=$(curl -s -o /dev/null -w "%{http_code}" "http://127.0.0.1:3000" || true)
            if [ "$code" = "200" ] || [ "$code" = "301" ] || [ "$code" = "302" ]; then
              echo "Landing healthy (attempt $i, status $code)"
              # also check API from inside
              apicode=$(curl -s -o /dev/null -w "%{http_code}" "http://127.0.0.1:8080/healthz" || true)
              echo "API health: $apicode"
              exit 0
            fi
            echo "attempt $i: landing -> $code, retrying in 5s"
            sleep 5
          done
          echo "Landing did not become healthy in time"
          exit 1
HEOF
